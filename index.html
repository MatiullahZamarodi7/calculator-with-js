<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="calculator_projects/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Calculator</title>
  </head>
  <body>
    <div class="container">
      <div class="cls">
        <input class="input" type="text" placeholder="Type your number" readonly />
        
        <div class="first">
          <input class="AC operator" type="button" value="AC" />
          <input class="DEL operator" type="button" value="DEL" />
          <input class="value operator" type="button" value="%" />
          <input class="value operator" type="button" value="/" />
        </div>

        <div class="seconds">
          <input class="value" type="button" value="7" />
          <input class="value" type="button" value="8" />
          <input class="value" type="button" value="9" />
          <input class="value operator" type="button" value="*" />
        </div>

        <div class="therd">
          <input class="value" type="button" value="4" />
          <input class="value" type="button" value="5" />
          <input class="value" type="button" value="6" />
          <input class="value operator" type="button" value="-" />
        </div>

        <div class="fourth">
          <input class="value" type="button" value="1" />
          <input class="value" type="button" value="2" />
          <input class="value" type="button" value="3" />
          <input class="value operator" type="button" value="+" />
        </div>

        <div class="five">
          <input class="value operator" type="button" value="." />
          <input class="value" type="button" value="0" />
          <input class="equal operator" type="button" value="=" />
        </div>

      </div>
    </div>

    <script src="calculator_projects/App.js"></script>
  </body>
</html>
